<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本地図</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
  text-align:center;
}

/* 地図 */
#map svg{
  width:100%;
  max-width:600px;
}

/* 色 */
.pink{ fill:#ff9ecb !important; }
.blue{ fill:#6fa8ff !important; }
.green{ fill:#7ed957 !important; }
.black{ fill:#000 !important; }

/* ボタンエリア */
#buttons{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:5px;
  padding:10px;
}

#buttons button{
  padding:8px;
  font-size:12px;
}

/* 画像表示 */
#result img{
  width:100%;
  max-width:100vw;
}

/* 横画面でピッタリ */
@media (orientation: landscape){
  #result img{
    width:100vw;
    height:auto;
  }
}
</style>
</head>

<body>

<h3>都道府県選択</h3>

<div id="buttons"></div>

<div id="map">
<!-- ★ここにSVG貼る -->
</div>

<button onclick="generateImage()">画像生成</button>

<div id="result"></div>

<script>
// 都道府県
const prefNames = {
 "01":"北海道","02":"青森","03":"岩手","04":"宮城","05":"秋田","06":"山形","07":"福島",
 "08":"茨城","09":"栃木","10":"群馬","11":"埼玉","12":"千葉","13":"東京","14":"神奈川",
 "15":"新潟","16":"富山","17":"石川","18":"福井","19":"山梨","20":"長野","21":"岐阜",
 "22":"静岡","23":"愛知","24":"三重","25":"滋賀","26":"京都","27":"大阪","28":"兵庫",
 "29":"奈良","30":"和歌山","31":"鳥取","32":"島根","33":"岡山","34":"広島","35":"山口",
 "36":"徳島","37":"香川","38":"愛媛","39":"高知",
 "40":"福岡","41":"佐賀","42":"長崎","43":"熊本","44":"大分","45":"宮崎","46":"鹿児島","47":"沖縄"
};

const colors = ["", "pink", "blue", "green", "black"];

// ボタン生成
const btnArea = document.getElementById("buttons");

Object.entries(prefNames).forEach(([code,name])=>{
  const btn = document.createElement("button");
  btn.textContent = name;

  btn.onclick = ()=>{
    const pref = document.querySelector(`[data-code="${parseInt(code)}"]`);
    if(!pref) return;

    let state = (parseInt(pref.dataset.state || 0) + 1) % 5;
    pref.dataset.state = state;

    pref.classList.remove("pink","blue","green","black");
    if(state !== 0) pref.classList.add(colors[state]);
  };

  btnArea.appendChild(btn);
});

// 初期化
document.querySelectorAll(".prefecture").forEach(p=>{
  p.dataset.state = 0;
});

// 画像生成
function generateImage(){
  const svg = document.querySelector("#map svg");

  const serializer = new XMLSerializer();
  let source = serializer.serializeToString(svg);

  const img = new Image();
  const svgBlob = new Blob([source], {type:"image/svg+xml;charset=utf-8"});
  const url = URL.createObjectURL(svgBlob);

  img.onload = ()=>{
    const canvas = document.createElement("canvas");

    // スマホ横サイズ想定
    canvas.width = 1000;
    canvas.height = 1000;

    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#fff";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(img,0,0,canvas.width,canvas.height);

    const png = canvas.toDataURL("image/png");

    document.getElementById("result").innerHTML =
      `<img src="${png}">`;

    URL.revokeObjectURL(url);
  };

  img.src = url;
}
</script>

</body>
</html>
