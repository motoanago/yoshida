<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本地図訪問カウント</title>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; text-align:center; padding-bottom: 50px; }
h3 { margin:10px 0; }

#buttons {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  padding:10px;
  max-width:600px;
  margin:auto;
}

#buttons button {
  padding:10px;
  font-size:11px;
  cursor: pointer;
  border: 1px solid #ccc;
  background: #fff;
  border-radius: 4px;
}

.control-panel {
  display:flex;
  gap:10px;
  padding:10px;
  max-width:600px;
  margin:auto;
}

.btn {
  flex:1;
  padding:15px;
  font-weight:bold;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor: pointer;
  font-size: 16px;
}

.generate-btn { background:#2ea44f; }
.reset-btn { background:#d73a49; }

#map {
  margin-top: 20px;
  background: #fff;
  border: 1px solid #ddd;
  padding: 10px;
}

#map svg {
  width:100%;
  max-width:800px;
  height: auto;
}
</style>
</head>

<body>

<h3>都道府県を選択</h3>
<div id="buttons"></div>

<div class="control-panel">
  <button class="btn generate-btn" onclick="generateImage()">画像として保存</button>
  <button class="btn reset-btn" onclick="resetAll()">リセット</button>
</div>

<div id="map">
  <!-- 日本地図SVG（簡易版パスデータ） -->
  <svg id="japan-svg" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
    <g data-code="01"><path d="M650 150l20-30 40 10 10 40-30 30-40-10z" stroke="#999" fill="#EEE"/></g> <!-- 北海道 -->
    <g data-code="02"><path d="M620 230l30 0 0 20-30 0z" stroke="#999" fill="#EEE"/></g> <!-- 青森 -->
    <g data-code="03"><path d="M635 255l15 0 0 30-15 0z" stroke="#999" fill="#EEE"/></g> <!-- 岩手 -->
    <g data-code="04"><path d="M635 290l15 0 0 25-15 0z" stroke="#999" fill="#EEE"/></g> <!-- 宮城 -->
    <g data-code="05"><path d="M615 255l15 0 0 30-15 0z" stroke="#999" fill="#EEE"/></g> <!-- 秋田 -->
    <g data-code="06"><path d="M615 290l15 0 0 25-15 0z" stroke="#999" fill="#EEE"/></g> <!-- 山形 -->
    <g data-code="07"><path d="M615 320l35 0 0 30-35 0z" stroke="#999" fill="#EEE"/></g> <!-- 福島 -->
    <g data-code="08"><path d="M630 355l20 0 0 20-20 0z" stroke="#999" fill="#EEE"/></g> <!-- 茨城 -->
    <g data-code="09"><path d="M610 355l15 0 0 20-15 0z" stroke="#999" fill="#EEE"/></g> <!-- 栃木 -->
    <g data-code="10"><path d="M590 355l15 0 0 20-15 0z" stroke="#999" fill="#EEE"/></g> <!-- 群馬 -->
    <g data-code="11"><path d="M590 380l35 0 0 15-35 0z" stroke="#999" fill="#EEE"/></g> <!-- 埼玉 -->
    <g data-code="12"><path d="M630 380l20 0 0 40-20 0z" stroke="#999" fill="#EEE"/></g> <!-- 千葉 -->
    <g data-code="13"><path d="M595 400l30 0 0 15-30 0z" stroke="#999" fill="#EEE"/></g> <!-- 東京 -->
    <g data-code="14"><path d="M595 420l25 0 0 15-25 0z" stroke="#999" fill="#EEE"/></g> <!-- 神奈川 -->
    <g data-code="15"><path d="M570 310l40 0 0 40-40 0z" stroke="#999" fill="#EEE"/></g> <!-- 新潟 -->
    <g data-code="16"><path d="M545 340l20 0 0 30-20 0z" stroke="#999" fill="#EEE"/></g> <!-- 富山 -->
    <g data-code="17"><path d="M525 330l15 0 0 40-15 0z" stroke="#999" fill="#EEE"/></g> <!-- 石川 -->
    <g data-code="18"><path d="M510 365l10 0 0 30-10 0z" stroke="#999" fill="#EEE"/></g> <!-- 福井 -->
    <g data-code="19"><path d="M575 380l10 0 0 25-10 0z" stroke="#999" fill="#EEE"/></g> <!-- 山梨 -->
    <g data-code="20"><path d="M560 355l10 0 0 50-10 0z" stroke="#999" fill="#EEE"/></g> <!-- 長野 -->
    <g data-code="21"><path d="M535 375l20 0 0 30-20 0z" stroke="#999" fill="#EEE"/></g> <!-- 岐阜 -->
    <g data-code="22"><path d="M560 410l30 0 0 25-30 0z" stroke="#999" fill="#EEE"/></g> <!-- 静岡 -->
    <g data-code="23"><path d="M540 410l15 0 0 25-15 0z" stroke="#999" fill="#EEE"/></g> <!-- 愛知 -->
    <g data-code="24"><path d="M520 425l15 0 0 35-15 0z" stroke="#999" fill="#EEE"/></g> <!-- 三重 -->
    <g data-code="25"><path d="M520 400l15 0 0 20-15 0z" stroke="#999" fill="#EEE"/></g> <!-- 滋賀 -->
    <g data-code="26"><path d="M500 395l15 0 0 25-15 0z" stroke="#999" fill="#EEE"/></g> <!-- 京都 -->
    <g data-code="27"><path d="M500 425l15 0 0 20-15 0z" stroke="#999" fill="#EEE"/></g> <!-- 大阪 -->
    <g data-code="28"><path d="M475 395l20 0 0 45-20 0z" stroke="#999" fill="#EEE"/></g> <!-- 兵庫 -->
    <g data-code="29"><path d="M505 450l10 0 0 20-10 0z" stroke="#999" fill="#EEE"/></g> <!-- 奈良 -->
    <g data-code="30"><path d="M490 455l10 0 0 30-10 0z" stroke="#999" fill="#EEE"/></g> <!-- 和歌山 -->
    <g data-code="31"><path d="M445 400l25 0 0 15-25 0z" stroke="#999" fill="#EEE"/></g> <!-- 鳥取 -->
    <g data-code="32"><path d="M410 405l30 0 0 15-30 0z" stroke="#999" fill="#EEE"/></g> <!-- 島根 -->
    <g data-code="33"><path d="M445 420l25 0 0 20-25 0z" stroke="#999" fill="#EEE"/></g> <!-- 岡山 -->
    <g data-code="34"><path d="M420 425l20 0 0 25-20 0z" stroke="#999" fill="#EEE"/></g> <!-- 広島 -->
    <g data-code="35"><path d="M395 425l20 0 0 25-20 0z" stroke="#999" fill="#EEE"/></g> <!-- 山口 -->
    <g data-code="36"><path d="M445 470l20 0 0 20-20 0z" stroke="#999" fill="#EEE"/></g> <!-- 徳島 -->
    <g data-code="37"><path d="M440 450l25 0 0 15-25 0z" stroke="#999" fill="#EEE"/></g> <!-- 香川 -->
    <g data-code="38"><path d="M410 455l25 0 0 25-25 0z" stroke="#999" fill="#EEE"/></g> <!-- 愛媛 -->
    <g data-code="39"><path d="M415 485l30 0 0 15-30 0z" stroke="#999" fill="#EEE"/></g> <!-- 高知 -->
    <g data-code="40"><path d="M365 440l25 0 0 20-25 0z" stroke="#999" fill="#EEE"/></g> <!-- 福岡 -->
    <g data-code="41"><path d="M345 450l15 0 0 15-15 0z" stroke="#999" fill="#EEE"/></g> <!-- 佐賀 -->
    <g data-code="42"><path d="M320 450l20 0 0 35-20 0z" stroke="#999" fill="#EEE"/></g> <!-- 長崎 -->
    <g data-code="43"><path d="M345 470l20 0 0 30-20 0z" stroke="#999" fill="#EEE"/></g> <!-- 熊本 -->
    <g data-code="44"><path d="M370 465l15 0 0 25-15 0z" stroke="#999" fill="#EEE"/></g> <!-- 大分 -->
    <g data-code="45"><path d="M370 495l15 0 0 35-15 0z" stroke="#999" fill="#EEE"/></g> <!-- 宮崎 -->
    <g data-code="46"><path d="M340 505l25 0 0 30-25 0z" stroke="#999" fill="#EEE"/></g> <!-- 鹿児島 -->
    <g data-code="47"><path d="M250 550l30 0 0 10-30 0z" stroke="#999" fill="#EEE"/></g> <!-- 沖縄 -->
  </svg>
</div>

<script>
const prefList = [
    ["01","北海道"],["02","青森"],["03","岩手"],["04","宮城"],["05","秋田"],["06","山形"],["07","福島"],
    ["08","茨城"],["09","栃木"],["10","群馬"],["11","埼玉"],["12","千葉"],["13","東京"],["14","神奈川"],
    ["15","新潟"],["16","富山"],["17","石川"],["18","福井"],["19","山梨"],["20","長野"],["21","岐阜"],["22","静岡"],["23","愛知"],
    ["24","三重"],["25","滋賀"],["26","京都"],["27","大阪"],["28","兵庫"],["29","奈良"],["30","和歌山"],
    ["31","鳥取"],["32","島根"],["33","岡山"],["34","広島"],["35","山口"],
    ["36","徳島"],["37","香川"],["38","愛媛"],["39","高知"],
    ["40","福岡"],["41","佐賀"],["42","長崎"],["43","熊本"],["44","大分"],["45","宮崎"],["46","鹿児島"],["47","沖縄"]
];

const colors = ["#EEEEEE","#ff9ecb","#6fa8ff","#7ed957","#ffeb3b"];
const STORAGE_KEY="prefStates";

function loadState(){return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");}
function saveState(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}

function updateDisplay(code,state){
  const g=document.querySelector(`g[data-code="${code}"]`);
  if(g){
    g.querySelectorAll("path").forEach(e => {
        e.setAttribute("fill", colors[state]);
        e.style.fill = colors[state];
    });
  }
}

window.onload=()=>{
  const saved=loadState();
  const area=document.getElementById("buttons");

  prefList.forEach(([code,name])=>{
    let state=saved[code]||0;
    const btn=document.createElement("button");
    btn.textContent=name+"("+state+")";

    btn.onclick=()=>{
      state=(state+1)%colors.length;
      saved[code]=state;
      saveState(saved);
      updateDisplay(code,state);
      btn.textContent=name+"("+state+")";
    };

    area.appendChild(btn);
    updateDisplay(code,state);
  });
};

function resetAll(){
  if(!confirm("リセットしますか？"))return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function generateImage(){
  const svg = document.getElementById("japan-svg");
  const canvas = document.createElement("canvas");
  canvas.width = 1280;
  canvas.height = 720;
  const ctx = canvas.getContext("2d");

  const svgData = new XMLSerializer().serializeToString(svg);
  const svgBase64 = btoa(unescape(encodeURIComponent(svgData)));
  const img = new Image();

  img.onload = () => {
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 地図描画
    ctx.drawImage(img, 100, 80, 1080, 580);

    // 文字入れ
    ctx.font = "bold 40px sans-serif";
    ctx.lineJoin = "round";
    ctx.lineWidth = 8;
    ctx.strokeStyle = "gold";
    ctx.strokeText("勇者紋章４７都道府県から集めるまでおわれません！！", 40, 60);
    ctx.fillStyle = "blue";
    ctx.fillText("勇者紋章４７都道府県から集めるまでおわれません！！", 40, 60);

    ctx.font = "bold 30px sans-serif";
    ctx.fillStyle = "deeppink";
    ctx.textAlign = "center";
    ctx.fillText("２６日23:30～予約バトル！", canvas.width / 2, 700);

    // 保存処理
    const dataUrl = canvas.toDataURL("image/jpeg", 0.9);
    const link = document.createElement("a");
    link.href = dataUrl;
    link.download = `japan_map_${Date.now()}.jpg`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    
    alert("保存を開始しました。ダウンロードフォルダを確認してください。");
  };

  img.src = "data:image/svg+xml;base64," + svgBase64;
}
</script>

</body>
</html>
