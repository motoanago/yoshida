<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>カオスストーリー</title>

<style>
:root{
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

body{
  margin:0;
  background:#0d0d0d;
  color:#fff;
  font-family:-apple-system, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:var(--safe-top) 10px var(--safe-bottom);
}

.screen{
  width:100%;
  max-width:520px;
  display:none;
  opacity:0;
  transition:.3s;
}

.active{display:block;opacity:1;}

.card{
  background:#1a1a1a;
  padding:18px;
  border-radius:14px;
  margin-bottom:16px;
}

/* ===== テキスト ===== */
#scene{
  font-size:clamp(16px,4vw,20px);
  line-height:1.7;
}

/* ===== ボタン ===== */
button{
  width:100%;
  border:none;
  border-radius:12px;
  background:#333;
  color:#fff;
  cursor:pointer;
  transition:.15s;
}

/* サイズランダム */
.small{ padding:8px; font-size:13px; }
.medium{ padding:14px; font-size:16px; }
.large{ padding:20px; font-size:20px; }

button:active{
  transform:scale(0.96);
  background:#555;
}

#choices{
  max-height:50vh;
  overflow-y:auto;
}

/* ===== 結果 ===== */
#finalLog{
  white-space:pre-line;
  font-size:14px;
  line-height:1.6;
}
</style>
</head>
<body>

<div id="startScreen" class="screen active">
  <div class="card">
    <h2>カオスストーリー</h2>
    <button class="large" onclick="start()">開始</button>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div class="card">
    <div id="scene"></div>
  </div>
  <div id="choices"></div>
</div>

<div id="endScreen" class="screen">
  <div class="card">
    <h2 id="ending"></h2>
    <div id="finalLog"></div>
    <button class="medium" onclick="reset()">もう一度</button>
  </div>
</div>

<script>
// ===== データ =====
const openings=[
"あなたは見知らぬ部屋で目を覚ました。",
"通勤中、世界が止まった。",
"学校に誰もいない。",
"逃げ続けている理由を思い出せない。",
"宇宙船の中にいた。",
"時間が巻き戻った。",
"知らない街にいる。"
];

// ===== 文章 =====
const texts=[
"何かがおかしい。",
"視線を感じる。",
"この出来事は前にもあった気がする。",
"ペンギンが議論しているが内容は重要そうだ。",
"冷蔵庫がこちらを否定した。",
"意味だけが存在している。",
"あなたの選択が遅れて現実に反映される。",
"誰かが結果を先に知っている。",
"ここにいる理由を思い出せないまま進んでいる。"
];

// ===== ハズレ =====
const badMessages=[
"その選択は存在しなかった。",
"世界が巻き戻った。",
"すべてが無効化された。",
"あなたは選ばれる側だった。"
];

// ===== 選択肢大量 =====
const actions=[
"声のする方へ進む",
"違和感の正体を確かめる",
"何も知らないふりをする",
"ここに来なかったことにする",
"時間を巻き戻す",
"すべてを受け入れる",
"現実を疑う",
"自分の記憶を疑う",
"誰かに話しかける",
"踊りながら進む",
"無になる",
"壁になる",
"空気と会話する",
"存在を分裂させる",
"その場で止まる",
"目を閉じる",
"結末を先に考える",
"この選択をなかったことにする",
"理由を探す",
"理由を捨てる"
];

function rand(a){return a[Math.floor(Math.random()*a.length)];}

// ===== 状態 =====
let step,maxStep,history;

// ===== 画面 =====
function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// ===== 開始 =====
function start(){
 step=0;
 maxStep=5+Math.floor(Math.random()*3);
 history=[rand(openings)];
 show("gameScreen");
 next();
}

// ===== サイズランダム =====
function randomSize(){
 const sizes=["small","medium","large"];
 return rand(sizes);
}

// ===== 選択生成 =====
function makeChoices(){
 let count=2+Math.floor(Math.random()*8); // 最大増量
 let shuffled=[...actions].sort(()=>Math.random()-0.5);
 return shuffled.slice(0,count);
}

// ===== 進行 =====
function next(choice){

 if(choice){
  history.push("→ "+choice);
  history.push("あなたは「"+choice+"」を選んだ。");
 }

 step++;

 const text=rand(texts);
 history.push(text);

 document.getElementById("scene").innerText=text;

 if(step>=maxStep){end();return;}

 const div=document.getElementById("choices");
 div.innerHTML="";

 makeChoices().forEach(c=>{
  const btn=document.createElement("button");
  btn.innerText=c;

  // サイズカオス
  btn.classList.add(randomSize());

  // ハズレ
  const trap=Math.random()<0.2;

  btn.onclick=()=>{
    if(trap){
      badEnd(c);
      return;
    }
    next(c);
  };

  if(trap){
    btn.style.opacity=0.7;
  }

  div.appendChild(btn);
 });
}

// ===== ハズレ =====
function badEnd(choice){
 document.getElementById("ending").innerText=rand(badMessages);
 document.getElementById("finalLog").innerHTML=
 history.join("<br>")+"<br><br>→ '"+choice+"' によりすべてがリセットされた";
 show("endScreen");
}

// ===== END =====
function end(){
 document.getElementById("ending").innerText="……";
 document.getElementById("finalLog").innerHTML=history.join("<br>");
 show("endScreen");
}

// ===== リセット =====
function reset(){show("startScreen");}
</script>

</body>
</html>
